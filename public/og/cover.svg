      <stop offset="0" stop-color="#6fc6dd"/><stop offset="1" stop-color="#ffe6bf"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6ba84f"/><stop offset="1" stop-color="#4f8a3a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>
  <circle cx="930" cy="150" r="70" fill="#fff6d8" opacity="0.95"/>
